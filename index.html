        /* ==========================================
           STREAMING_CHUNK:Configuring formatting utilities...
           ========================================== */
        const formatLAK = (value) => {
          if (value === null || value === undefined || isNaN(value)) return '0 ₭';
          const rounded = Math.round(value);
          const formattedNumber = rounded.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
          return `${formattedNumber} ₭`;
        };

        const calculateEndDate = (startDateStr, months) => {
          if (!startDateStr || isNaN(months) || months <= 0) return '—';
          const date = new Date(startDateStr);
          if (isNaN(date.getTime())) return '—';
          date.setMonth(date.getMonth() + parseInt(months, 10));
          const yyyy = date.getFullYear();
          const mm = String(date.getMonth() + 1).padStart(2, '0');
          const dd = String(date.getDate()).padStart(2, '0');
          return `${yyyy}-${mm}-${dd}`;
        };

        /* ==========================================
           STREAMING_CHUNK:Defining calculations...
           ========================================== */
        const calculateLoanDetails = (principal, annualRate, months, interestType, startDateStr, fee) => {
          if (isNaN(principal) || principal <= 0 || isNaN(annualRate) || annualRate < 0 || isNaN(months) || months <= 0) {
            return null;
          }

          const feeAmount = isNaN(fee) || fee < 0 ? 0 : fee;
          let schedule = [];
          let totalInterest = 0;
          let monthlyPayment = 0;

          const getInstallmentDate = (monthOffset) => {
            if (!startDateStr) return '—';
            const date = new Date(startDateStr);
            if (isNaN(date.getTime())) return '—';
            date.setMonth(date.getMonth() + monthOffset);
            const yyyy = date.getFullYear();
            const mm = String(date.getMonth() + 1).padStart(2, '0');
            const dd = String(date.getDate()).padStart(2, '0');
            return `${yyyy}-${mm}-${dd}`;
          };

          if (interestType === 'fixed') {
            totalInterest = principal * (annualRate / 100) * (months / 12);
            const totalAmountToRepay = principal + totalInterest;
            monthlyPayment = totalAmountToRepay / months;

            let remainingBalance = principal;
            const monthlyPrincipalPayment = principal / months;
            const monthlyInterestPayment = totalInterest / months;

            for (let i = 1; i <= months; i++) {
              remainingBalance -= monthlyPrincipalPayment;
              schedule.push({
                month: i,
                paymentDate: getInstallmentDate(i),
                payment: monthlyPayment,
                principalPayment: monthlyPrincipalPayment,
                interestPayment: monthlyInterestPayment,
                remainingBalance: Math.max(0, remainingBalance),
                status: 'unpaid'
              });
            }
          } else {
            const monthlyRate = (annualRate / 100) / 12;
            if (monthlyRate === 0) {
              monthlyPayment = principal / months;
              let remainingBalance = principal;
              for (let i = 1; i <= months; i++) {
                remainingBalance -= monthlyPayment;
                schedule.push({
                  month: i,
                  paymentDate: getInstallmentDate(i),
                  payment: monthlyPayment,
                  principalPayment: monthlyPayment,
                  interestPayment: 0,
                  remainingBalance: Math.max(0, remainingBalance),
                  status: 'unpaid'
                });
              }
            } else {
              monthlyPayment = (principal * monthlyRate * Math.pow(1 + monthlyRate, months)) / (Math.pow(1 + monthlyRate, months) - 1);
              let currentBalance = principal;
              for (let i = 1; i <= months; i++) {
                const interestForMonth = currentBalance * monthlyRate;
                let principalForMonth = monthlyPayment - interestForMonth;
                if (i === months) {
                  principalForMonth = currentBalance;
                  monthlyPayment = principalForMonth + interestForMonth;
                }
                currentBalance -= principalForMonth;
                totalInterest += interestForMonth;
                schedule.push({
                  month: i,
                  paymentDate: getInstallmentDate(i),
                  payment: monthlyPayment,
                  principalPayment: principalForMonth,
                  interestPayment: interestForMonth,
                  remainingBalance: Math.max(0, currentBalance),
                  status: 'unpaid'
                });
              }
            }
          }

          return {
            monthlyPayment,
            totalInterest,
            totalRepayment: principal + totalInterest,
            feeAmount,
            totalExpectedReturn: principal + totalInterest + feeAmount,
            schedule
          };
        };

          });

          /* ==========================================
           STREAMING_CHUNK:Setting up BroadcastChannel for local tab synchronization...
           ========================================== */
          useEffect(() => {
            const syncChannel = new BroadcastChannel('sme_lender_local_tab_sync');
            
            syncChannel.onmessage = (event) => {
              const { type, payload } = event.data;
              if (type === 'SYNC_ALL_DATA' && !firebaseConnected) {
                if (payload.customers) setCustomers(payload.customers);
                if (payload.otherTransactions) setOtherTransactions(payload.otherTransactions);
                if (payload.ownerCapital !== undefined) setOwnerCapital(payload.ownerCapital);
                if (payload.ownerLiabilities !== undefined) setOwnerLiabilities(payload.ownerLiabilities);
              }
            };

            return () => {
              syncChannel.close();
            };
          }, [firebaseConnected]);

          const broadcastLocalSync = (updatedCustomers, updatedTransactions, capital, liabilities) => {
            const syncChannel = new BroadcastChannel('sme_lender_local_tab_sync');
            syncChannel.postMessage({
              type: 'SYNC_ALL_DATA',
              payload: {
                customers: updatedCustomers,
                otherTransactions: updatedTransactions,
                ownerCapital: capital,
                ownerLiabilities: liabilities
              }
            });
          };

          /* ==========================================
             STREAMING_CHUNK:Firebase Initialization & Robust Connection Diagnostics...
             ========================================== */
          useEffect(() => {
            if (!fbConfig) {
              loadFallbackData();
              setFirebaseConnected(false);
              setConnectionError(null);
              return;
            }

            let app;
            let connectedListener;
            let customersListener;
            let transListener;
            let capitalListener;
            let liabilitiesListener;

            try {
              if (!fbConfig.databaseURL || fbConfig.databaseURL.trim() === "") {
                throw new Error("ກະລຸນາປ້ອນ 'Database URL' ໃນ Firebase Config.");
              }

              if (!firebase.apps.length) {
                app = firebase.initializeApp(fbConfig);
              } else {
                app = firebase.app();
              }
              
              const db = app.database();
              setConnectionError("ກຳລັງກວດສອບການເຊື່ອມຕໍ່ຫາ Cloud Server...");

              // Real-time Database connection diagnostics
              const connectedRef = db.ref(".info/connected");
              connectedListener = connectedRef.on('value', (snap) => {
                const isConnected = snap.val() === true;
                setFirebaseConnected(isConnected);
                if (isConnected) {
                  setConnectionError(null);
                } else {
                  setConnectionError("ກຳລັງພະຍາຍາມເຊື່ອມຕໍ່ຫາຄລາວ... (ກວດສອບອິນເຕີເນັດຂອງທ່ານ)");
                }
              });

              // Secure Data Listeners with Fallbacks
              const customersRef = db.ref('customers');
              customersListener = customersRef.on('value', 
                (snapshot) => {
                  const val = snapshot.val();
                  const dataList = val ? Object.values(val) : [];
                  setCustomers(dataList);
                  if (dataList.length === 0 && !val) {
                    insertInitialDemoData(db);
                  }
                },
                (error) => {
                  console.error("Firebase read customers blocked:", error);
                  setConnectionError(`ຖືກປະຕິເສດການເຂົ້າເຖິງ: ${error.message}. ກະລຸນາກວດສອບ Rules ຂອງ Database ໃຫ້ເປັນ true ພາຍໃຕ້ແທັບ Rules.`);
                  loadFallbackData();
                }
              );

              const transRef = db.ref('otherTransactions');
              transListener = transRef.on('value', 
                (snapshot) => {
                  const val = snapshot.val();
                  setOtherTransactions(val ? Object.values(val) : []);
                },
                (error) => {
                  console.error("Firebase read transactions blocked:", error);
                }
              );

              const capitalRef = db.ref('ownerCapital');
              capitalListener = capitalRef.on('value', 
                (snapshot) => {
                  const val = snapshot.val();
                  if (val !== null) setOwnerCapital(val);
                },
                (error) => {}
              );

              const liabilitiesRef = db.ref('ownerLiabilities');
              liabilitiesListener = liabilitiesRef.on('value', 
                (snapshot) => {
                  const val = snapshot.val();
                  if (val !== null) setOwnerLiabilities(val);
                },
                (error) => {}
              );

            } catch (err) {
              console.error("Firebase Boot Error:", err);
              setFirebaseConnected(false);
              setConnectionError(`ຂໍ້ຜິດພາດ: ${err.message}`);
              loadFallbackData();
            }

            return () => {
              if (app) {
                const db = app.database();
                if (connectedListener) db.ref(".info/connected").off('value', connectedListener);
                if (customersListener) db.ref('customers').off('value', customersListener);
                if (transListener) db.ref('otherTransactions').off('value', transListener);
                if (capitalListener) db.ref('ownerCapital').off('value', capitalListener);
                if (liabilitiesListener) db.ref('ownerLiabilities').off('value', liabilitiesListener);
              }
            };

          }, [fbConfig]);

          const loadFallbackData = () => {
            const localCust = localStorage.getItem('sme_local_customers');
            const localTrans = localStorage.getItem('sme_local_transactions');
            const localCap = localStorage.getItem('sme_local_capital');
            const localLiab = localStorage.getItem('sme_local_liabilities');

            const loadedCustomers = localCust ? JSON.parse(localCust) : [
              {
                id: 'demo-1',
                name: 'ສົມຊິດ ພັດທະນາ',
                phone: '02055567812',
                startDate: '2026-05-19',
                amount: 25000000,
                rate: 10,

                fee: 250000,
                endDate: '2026-11-19',

            const loadedTrans = localTrans ? JSON.parse(localTrans) : [
              { id: 't-1', type: 'income', amount: 500000, description: 'ຄ່າທີ່ປຶກສາທຸລະກິດ', date: '2026-05-20' },
              { id: 't-2', type: 'expense', amount: 120000, description: 'ຊື້ເຈ້ຍ ແລະ ປາກກາຫ້ອງການ', date: '2026-05-21' }
            ];

            setCustomers(loadedCustomers);
            setOtherTransactions(loadedTrans);
            if (localCap) setOwnerCapital(parseFloat(localCap));
            if (localLiab) setOwnerLiabilities(parseFloat(localLiab));

            broadcastLocalSync(loadedCustomers, loadedTrans, localCap ? parseFloat(localCap) : ownerCapital, localLiab ? parseFloat(localLiab) : ownerLiabilities);
          };

          const insertInitialDemoData = (db) => {
            const initialDemo = {
              'demo-1': {
                id: 'demo-1',
                name: 'ສົມຊິດ ພັດທະນາ',
                phone: '02055567812',
                startDate: '2026-05-19',

                rate: 10,

                type: 'reducing',

                endDate: '2026-11-19',

              }

            db.ref('customers').set(initialDemo);
            db.ref('ownerCapital').set(500000000);
            db.ref('ownerLiabilities').set(100000000);
          };

          // Save fallback copies to localStorage whenever states change locally
          useEffect(() => {
            if (!firebaseConnected) {
              localStorage.setItem('sme_local_customers', JSON.stringify(customers));
              localStorage.setItem('sme_local_transactions', JSON.stringify(otherTransactions));

              localStorage.setItem('sme_local_liabilities', ownerLiabilities.toString());

          }, [customers, otherTransactions, ownerCapital, ownerLiabilities, firebaseConnected]);

          const updateCapitalLocalOrCloud = (newVal) => {

          const handleInputChange = (e) => {
            const { name, value } = e.target;
            setFormData(prev => ({ ...prev, [name]: value }));
          };

          const handleTypeChange = (type) => {

          const livePreview = useMemo(() => {
            return calculateLoanDetails(
              parseFloat(formData.amount),

          const liveEndDate = useMemo(() => {
            return calculateEndDate(formData.startDate, formData.term);
          }, [formData.startDate, formData.term]);

          /* ==========================================
             STREAMING_CHUNK:Structuring ledger transactions...
             ========================================== */
          const handleSaveCustomer = () => {
            if (!formData.name.trim() || !livePreview) return;

            const newCustId = Date.now().toString();
            const newCustomer = {
              id: newCustId,
              ...formData,
              amount: parseFloat(formData.amount),
              rate: parseFloat(formData.rate),

              const updatedList = [newCustomer, ...customers];
              setCustomers(updatedList);
              broadcastLocalSync(updatedList, otherTransactions, ownerCapital, ownerLiabilities);

            setTimeout(() => setShowSuccessMsg(false), 3000);

            setFormData(prev => ({
              ...prev,

              phone: '',
              amount: 15000000,

                    return { ...item, status: item.status === 'paid' ? 'unpaid' : 'paid' };

                  return item;

                return {
                  ...customer,
                  results: {
                    ...customer.results,
                    schedule: updatedSchedule
                  }
                };
              }
              return customer;
            });

            if (firebaseConnected) {
              const customerToUpdate = updatedCustomers.find(c => c.id === customerId);

              type: otherTransForm.type,
              amount: amt,

                                    <div>
                                      <span className={`inline-block px-2 py-0.5 text-[10px] font-bold rounded-lg ${
                                        customer.type === 'reducing' ? 'bg-emerald-100 text-emerald-800' : 'bg-amber-100 text-amber-800'
                                      }`}>
                                        {customer.type === 'reducing' ? 'ຫຼຸດຕົ້ນຫຼຸດດອກ' : 'ດອກເບ້ຍຄົງທີ່'}
                                      </span>
                                    </div>
                                  </div>

                                  <div className="grid grid-cols-2 md:grid-cols-4 gap-3 text-[11px] pb-3 border-b border-slate-100/50">
                                    <div>
                                      <p className="text-slate-400 font-bold mb-0.5">ຕົ້ນທຶນປ່ອຍກູ້</p>
                                      <p className="font-extrabold text-slate-900">{formatLAK(customer.amount)}</p>
                                    </div>
                                    <div>
                                      <p className="text-slate-400 font-bold mb-0.5">ຄ່າທຳນຽມເກັບກ່ອນ</p>
                                      <p className="font-extrabold text-blue-600">{formatLAK(customer.fee)}</p>
                                    </div>
                                    <div>
                                      <p className="text-slate-400 font-bold mb-0.5">ດອກເບ້ຍ / ໄລຍະເວລາ</p>
                                      <p className="font-bold text-slate-800">{customer.rate}% / {customer.term} ເດືອນ</p>
                                    </div>
                                    <div>
                                      <p className="text-slate-400 font-bold mb-0.5">ຄ່າຜ່ອນຊຳລະຕໍ່ເດືອນ</p>
                                      <p className="font-extrabold text-blue-700">{formatLAK(customer.results.monthlyPayment)}</p>
                                    </div>
                                  </div>

                                  {/* EXPANDABLE REPAYMENT GRID */}
                                  {isExpanded && (
                                    <div className="mt-4 border border-slate-200/60 rounded-lg overflow-hidden max-h-60 overflow-y-auto shadow-inner bg-slate-50/20">
                                      <table className="w-full text-left text-xs border-collapse">
                                        <thead>
                                          <tr className="bg-slate-100/80 text-slate-500 font-bold text-[10px] border-b border-slate-200">
                                            <th className="py-2.5 px-3 text-center">ງວດ</th>
                                            <th className="py-2.5 px-3 text-center">ວັນທີກຳນົດສົ່ງ</th>
                                            <th className="py-2.5 px-3 text-right">ຍອດຊຳລະ</th>
                                            <th className="py-2.5 px-3 text-right">ຕົ້ນທຶນ</th>
                                            <th className="py-2.5 px-3 text-right">ດອກເບ້ຍ</th>
                                            <th className="py-2.5 px-3 text-center">ການຊຳລະ</th>
                                          </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100 text-slate-700 bg-white">
                                          {customer.results.schedule.map((row) => (
                                            <tr key={row.month} className="hover:bg-slate-50/50 transition-colors">
                                              <td className="py-2 px-3 text-center font-bold text-slate-500">{row.month}</td>
                                              <td className="py-2 px-3 text-center font-bold text-blue-700">{row.paymentDate}</td>
                                              <td className="py-2 px-3 text-right font-bold text-slate-900">{formatLAK(row.payment)}</td>
                                              <td className="py-2 px-3 text-right text-emerald-600 font-semibold">{formatLAK(row.principalPayment)}</td>
                                              <td className="py-2 px-3 text-right text-amber-600 font-semibold">{formatLAK(row.interestPayment)}</td>
                                              <td className="py-2 px-3 text-center">
                                                <button
                                                  onClick={() => toggleInstallmentStatus(customer.id, row.month)}
                                                  className={`px-2.5 py-0.5 rounded text-[10px] font-bold transition-all ${
                                                    row.status === 'paid'
                                                      ? 'bg-emerald-100 text-emerald-800 border border-emerald-200'
                                                      : 'bg-rose-100 text-rose-800 hover:bg-rose-200 border border-rose-200'
                                                  }`}
                                                >
                                                  {row.status === 'paid' ? '✓ ຊຳລະແລ້ວ' : 'ໝາຍວ່າຊຳລະ'}
                                                </button>
                                              </td>
                                            </tr>
                                          ))}
                                        </tbody>
                                      </table>
                                    </div>
                                  )}

                                  <div className="pt-3 flex flex-wrap gap-2 justify-between items-center">
                                    <div className="flex gap-2">
                                      <button
                                        onClick={() => setExpandedCustomerId(isExpanded ? null : customer.id)}
                                        className="text-xs font-bold text-blue-600 bg-blue-50 hover:bg-blue-100 px-3 py-1.5 rounded-lg transition-colors"
                                      >
                                        {isExpanded ? 'ຫຍໍ້ຕາຕະລາງ' : 'ຂະຫຍາຍຕາຕະລາງ'}
                                      </button>
                                      <button
                                        onClick={() => printSingleCustomerSchedule(customer)}
                                        className="text-xs font-bold text-slate-700 bg-slate-100 hover:bg-slate-200 px-3 py-1.5 rounded-lg flex items-center transition-colors border border-slate-200"
                                      >
                                        <span className="mr-1"><IconPrinter /></span> ພິມສັນຍາ
                                      </button>
                                    </div>
                                    <span className="text-[10px] text-slate-400 font-bold">
                                      ຊຳລະແລ້ວ {paidCount}/{totalCount} ງວດ
                                    </span>
                                  </div>

                                </div>
                              );
                            })
                          )}
                        </div>
                      </div>

                    </div>

                    {/* FINANCIAL STATEMENT & BALANCE SHEET PANEL sitting perfectly at the bottom right */}
                    <div className="bg-white border border-slate-200 rounded-2xl overflow-hidden shadow-sm flex-1">
                      <div className="bg-slate-900 text-white p-4 font-bold text-sm uppercase tracking-wider flex justify-between items-center px-6 shrink-0">
                        <div className="flex items-center space-x-2">
                          <IconPercent />
                          <span>ບົດສະຫຼຸບການເງິນ & ງົບດຸນ (Balance Sheet)</span>
                        </div>
                        <button 
                          onClick={printFinancialStatement}
                          className="bg-white hover:bg-slate-100 text-slate-900 rounded-lg px-3 py-1.5 font-extrabold text-xs flex items-center transition-all shadow-sm"
                        >
                          <span className="mr-1.5"><IconPrinter /></span> ພິມລາຍງານ
                        </button>
                      </div>

                      <div className="p-4 space-y-4 text-xs">
                        {/* OWNER CONTROLS FOR BALANCING */}
                        <div className="bg-slate-50 p-3 rounded-xl border border-slate-200/50 space-y-3">
                          <p className="font-bold text-[11px] text-slate-500 uppercase tracking-wider">ຕັ້ງຄ່າທຶນ & ໜີ້ສິນ (Lender Capitalization)</p>
                          <div className="grid grid-cols-2 gap-3">
                            <div>
                              <label className="block text-[10px] font-bold text-slate-600 mb-1">ທຶນເລີ່ມຕົ້ນຂອງເຈົ້າຂອງ</label>
                              <input
                                type="number"
                                value={ownerCapital}
                                onChange={(e) => updateCapitalLocalOrCloud(Math.max(0, parseFloat(e.target.value) || 0))}
                                className="w-full px-2 py-1.5 border border-slate-300 rounded-lg font-bold text-xs"
                              />
                            </div>
                            <div>
                              <label className="block text-[10px] font-bold text-slate-600 mb-1">ໜີ້ສິນກູ້ຢືມພາຍນອກ</label>
                              <input
                                type="number"
                                value={ownerLiabilities}
                                onChange={(e) => updateLiabilitiesLocalOrCloud(Math.max(0, parseFloat(e.target.value) || 0))}
                                className="w-full px-2 py-1.5 border border-slate-300 rounded-lg font-bold text-xs"
                              />
                            </div>
                          </div>
                        </div>

                        {/* DOUBLE ENTRY VERIFICATION EQUATION */}
                        <div className="bg-emerald-50 border border-emerald-200 p-2.5 rounded-lg text-[11px] text-emerald-800 font-bold text-center">
                          ✓ ບັນຊີດຸນດ່ຽງ: ຊັບສິນ {formatLAK(financialSummary.totalAssets)} = ໜີ້ສິນ+ທຶນ {formatLAK(financialSummary.totalLiabilitiesAndEquity)}
                        </div>

                        {/* BALANCE SHEET TWO-COLUMN GRID */}
                        <div className="grid grid-cols-2 gap-3 font-semibold">
                          {/* ASSETS */}
                          <div className="p-3 bg-emerald-50/20 border border-emerald-100 rounded-lg space-y-2">
                            <h5 className="font-bold text-emerald-800 border-b border-emerald-200/70 pb-1 text-[11px] uppercase flex justify-between">
                              <span>1. ຊັບສິນ (ASSETS)</span>
                              <span className="font-extrabold text-[9px] bg-emerald-100 text-emerald-800 px-1 rounded">Dr</span>
                            </h5>
                            <div className="space-y-1.5 text-[11px] text-slate-600">
                              <div className="flex justify-between">
                                <span>ເງິນສົດໃນຄັງ</span>
                                <strong className="text-slate-800">{formatLAK(financialSummary.cashOnHand)}</strong>
                              </div>
                              <div className="flex justify-between">
                                <span>ຍອດເງິນກູ້ຄົງຄ້າງ</span>
                                <strong className="text-slate-800">{formatLAK(financialSummary.activeOutstandingPortfolio)}</strong>
                              </div>
                              <div className="flex justify-between">
                                <span>ດອກເບ້ຍຄ້າງຮັບ</span>
                                <strong className="text-slate-800">{formatLAK(financialSummary.interestReceivable)}</strong>
                              </div>
                            </div>
                            <div className="pt-1.5 border-t border-emerald-200/70 flex justify-between text-slate-900 font-bold">
                              <span>ລວມຊັບສິນ</span>
                              <span>{formatLAK(financialSummary.totalAssets)}</span>
                            </div>
                          </div>

                          {/* LIABILITIES & EQUITY */}
                          <div className="p-3 bg-blue-50/20 border border-blue-100 rounded-lg space-y-2">
                            <h5 className="font-bold text-blue-800 border-b border-blue-200/70 pb-1 text-[11px] uppercase flex justify-between">
                              <span>2-3. ໜີ້ສິນ & ທຶນ</span>
                              <span className="font-extrabold text-[9px] bg-blue-100 text-blue-800 px-1 rounded">Cr</span>
                            </h5>
                            <div className="space-y-1.5 text-[11px] text-slate-600">
                              <div className="flex justify-between">
                                <span>ເງິນກູ້ຢືມພາຍນອກ</span>
                                <strong className="text-slate-800">{formatLAK(financialSummary.totalLiabilities)}</strong>
                              </div>
                              <div className="flex justify-between">
                                <span>ທຶນເລີ່ມຕົ້ນ</span>
                                <strong className="text-slate-800">{formatLAK(financialSummary.initialCapital)}</strong>
                              </div>
                              <div className="flex justify-between">
                                <span>ລາຍຮັບສະສົມສຸທິ</span>
                                <strong className="text-emerald-700 font-extrabold">{formatLAK(financialSummary.netProfit)}</strong>
                              </div>
                            </div>
                            <div className="pt-1.5 border-t border-blue-200/70 flex justify-between text-slate-900 font-bold">
                              <span>ລວມໜີ້ສິນ & ທຶນ</span>
                              <span>{formatLAK(financialSummary.totalLiabilitiesAndEquity)}</span>
                            </div>
                          </div>
                        </div>

                        {/* REVENUE & EXPENSES STATEMENTS */}
                        <div className="grid grid-cols-2 gap-3 bg-slate-50 p-3 rounded-lg border border-slate-200">
                          <div className="space-y-1.5 text-[11px]">
                            <p className="font-bold text-slate-600 uppercase text-[9px]">5. ລາຍຮັບສະສົມ (Revenue)</p>
                            <div className="flex justify-between text-slate-500">
                              <span>ດອກເບ້ຍຄ້າງຮັບ:</span>
                              <span className="font-bold text-slate-700">{formatLAK(financialSummary.totalExpectedInterest)}</span>
                            </div>
                            <div className="flex justify-between text-slate-500">
                              <span>ຄ່າທຳນຽມສັນຍາ:</span>
                              <span className="font-bold text-slate-700">{formatLAK(financialSummary.totalFeesCollected)}</span>
                            </div>
                            <div className="flex justify-between text-slate-500">
                              <span>ລາຍຮັບອື່ນໆ:</span>
                              <span className="font-bold text-emerald-600">+{formatLAK(financialSummary.totalOtherIncome)}</span>
                            </div>
                          </div>

                          <div className="space-y-1.5 text-[11px] border-l pl-3 border-slate-200">
                            <p className="font-bold text-slate-600 uppercase text-[9px]">4. ລາຍຈ່າຍບໍລິຫານ (Expenses)</p>
                            <div className="flex justify-between text-slate-500">
                              <span>ລາຍຈ່າຍອື່ນໆ:</span>
                              <span className="font-bold text-rose-600">-{formatLAK(financialSummary.totalOtherExpenses)}</span>
                            </div>
                            <p className="text-[9px] text-slate-400 leading-tight pt-1">
                              * ຕົ້ນທຶນປ່ອຍກູ້ບໍ່ນັບເປັນລາຍຈ່າຍ (ປ່ຽນເປັນຊັບສິນລູກໜີ້).
                            </p>
                          </div>
                        </div>

                      </div>
                    </div>

                  </div>

                </div>

              </div>
            </div>
          );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
